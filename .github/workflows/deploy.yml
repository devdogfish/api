name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      DEPLOY_PATH: /home/ubuntu/api
      PRODUCTION_HEALTH_URL: https://api.girke.dev/health
      PRODUCTION_VERSION_URL: https://api.girke.dev/version
      REPOSITORY_URL: https://github.com/devdogfish/api.git

    steps:
      - name: Configure SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "$SSH_USER@$SSH_HOST" "DEPLOY_PATH='$DEPLOY_PATH' REPOSITORY_URL='$REPOSITORY_URL' bash -se" <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          gh auth setup-git -h github.com
          git config --global --unset-all url.git@github.com:.insteadOf || true
          git config --global --unset-all url.ssh://git@github.com/.insteadOf || true
          git config --local --unset-all url.git@github.com:.insteadOf || true
          git config --local --unset-all url.ssh://git@github.com/.insteadOf || true
          git remote set-url origin "$REPOSITORY_URL"
          git fetch --prune origin main
          git checkout -B main FETCH_HEAD
          git reset --hard FETCH_HEAD
          docker compose config --quiet
          docker compose build girke-api whisper
          docker compose up -d postgres
          docker compose run --rm --no-deps girke-api bun run db:migrate
          docker compose up -d --build
          docker image prune -f
          REMOTE

      - name: Verify production
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --retry 12 --retry-all-errors --retry-delay 5 "$PRODUCTION_HEALTH_URL" | grep '"ok":true'
          curl --fail --silent --show-error --retry 12 --retry-all-errors --retry-delay 5 "$PRODUCTION_VERSION_URL" >/dev/null
