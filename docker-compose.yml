services:
  girke-api:
    container_name: girke-api
    build: .
    env_file: .env
    volumes:
      - transcription_uploads:/tmp/girke-transcription-uploads
    depends_on:
      postgres:
        condition: service_healthy
      whisper:
        condition: service_started
    networks:
      - girke_api_internal
      - girke-edge
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: girke-api-postgres
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - girke_api_internal
    restart: unless-stopped

  whisper:
    container_name: girke-api-whisper
    build: ./whisper-sidecar
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_CPU_THREADS: ${WHISPER_CPU_THREADS:-4}
      WHISPER_NUM_WORKERS: ${WHISPER_NUM_WORKERS:-1}
      WHISPER_MODEL_LOW_EN: ${WHISPER_MODEL_LOW_EN:-base}
      WHISPER_MODEL_LOW_DE: ${WHISPER_MODEL_LOW_DE:-base}
      WHISPER_MODEL_LOW_AUTO: ${WHISPER_MODEL_LOW_AUTO:-base}
      WHISPER_MODEL_MEDIUM_EN: ${WHISPER_MODEL_MEDIUM_EN:-distil-small.en}
      WHISPER_MODEL_MEDIUM_DE: ${WHISPER_MODEL_MEDIUM_DE:-small}
      WHISPER_MODEL_MEDIUM_AUTO: ${WHISPER_MODEL_MEDIUM_AUTO:-small}
      WHISPER_MODEL_HIGH_EN: ${WHISPER_MODEL_HIGH_EN:-large-v3-turbo}
      WHISPER_MODEL_HIGH_DE: ${WHISPER_MODEL_HIGH_DE:-large-v3-turbo}
      WHISPER_MODEL_HIGH_AUTO: ${WHISPER_MODEL_HIGH_AUTO:-large-v3-turbo}
    volumes:
      - whisper_cache:/root/.cache/huggingface
    networks:
      - girke_api_internal
    restart: unless-stopped

volumes:
  postgres_data:
    name: girke_api_postgres_data
  whisper_cache:
    name: girke_api_whisper_cache
  transcription_uploads:
    name: girke_api_transcription_uploads

networks:
  girke_api_internal:
    driver: bridge
  girke-edge:
    external: true
