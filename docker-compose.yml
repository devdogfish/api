services:
  girke-api:
    container_name: girke-api
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      whisper:
        condition: service_started
    networks:
      - girke_api_internal
      - girke-edge
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: girke-api-postgres
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - girke_api_internal
    restart: unless-stopped

  whisper:
    container_name: girke-api-whisper
    build: ./whisper-sidecar
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
    volumes:
      - whisper_cache:/root/.cache/huggingface
    networks:
      - girke_api_internal
    restart: unless-stopped

volumes:
  postgres_data:
    name: girke_api_postgres_data
  whisper_cache:
    name: girke_api_whisper_cache

networks:
  girke_api_internal:
    driver: bridge
  girke-edge:
    external: true
